<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Community Surplus</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="index.html"><span class="brand-mark">CS</span> Community Surplus</a>
      <button class="nav-toggle" type="button" data-nav-toggle>Menu</button>
      <div class="nav-links" data-nav-links>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="sell.html">Sell</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="login.html" data-guest-only>Login</a>
        <a href="register.html" data-guest-only>Register</a>
        <button type="button" data-logout data-auth-only>Logout</button>
        <span class="user-chip" data-user-chip>Guest</span>
      </div>
    </nav>
  </header>

  <main class="page-shell container">
    <section class="auth-layout">
      <div class="auth-copy">
        <p class="eyebrow">Welcome back</p>
        <h1>Login</h1>
        <p>Use your account to sell products, manage listings, and track purchase requests.</p>
      </div>

      <form class="form-panel" data-login-form>
        <label class="field">
          <span>Email</span>
          <input name="email" type="email" required>
        </label>
        <label class="field">
          <span>Password</span>
          <input name="password" type="password" required>
        </label>
        <button class="button full" type="submit">Login</button>
        <p class="form-message" data-form-message></p>
        <p class="muted">New here? <a href="register.html">Create an account</a></p>
      </form>
    </section>
  </main>

  <script src="js/app.js" defer></script>
  <script src="js/login.js" defer></script>
</body>
</html>
