<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell Product | Community Surplus</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="index.html"><span class="brand-mark">CS</span> Community Surplus</a>
      <button class="nav-toggle" type="button" data-nav-toggle>Menu</button>
      <div class="nav-links" data-nav-links>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="sell.html">Sell</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="dashboard.html" data-auth-only>Dashboard</a>
        <a href="login.html" data-guest-only>Login</a>
        <a href="register.html" data-guest-only>Register</a>
        <button type="button" data-logout data-auth-only>Logout</button>
        <span class="user-chip" data-user-chip>Guest</span>
      </div>
    </nav>
  </header>

  <main class="page-shell container">
    <div class="page-header">
      <div>
        <p class="eyebrow">Seller</p>
        <h1>Sell Product</h1>
        <p>Add product details, price, location, and contact information.</p>
      </div>
      <a class="button secondary" href="my-products.html">My Products</a>
    </div>

    <form class="form-panel" data-sell-form>
      <div class="form-grid">
        <label class="field">
          <span>Product Name</span>
          <input name="productName" type="text" required>
        </label>
        <label class="field">
          <span>Category</span>
          <select name="category" required>
            <option value="Furniture">Furniture</option>
            <option value="Books">Books</option>
            <option value="Appliances">Appliances</option>
            <option value="Electronics">Electronics</option>
            <option value="Vehicles">Vehicles</option>
            <option value="Home">Home</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label class="field">
          <span>Condition</span>
          <select name="condition" required>
            <option value="Like New">Like New</option>
            <option value="Good">Good</option>
            <option value="Used">Used</option>
            <option value="Needs Repair">Needs Repair</option>
          </select>
        </label>
        <label class="field">
          <span>Original MRP</span>
          <input name="mrp" type="number" min="0" required>
        </label>
        <label class="field">
          <span>Unit Selling Price</span>
          <input name="sellingPrice" type="number" min="0" required>
        </label>
        <label class="field">
          <span>Quantity Available</span>
          <input name="quantity" type="number" min="1" step="1" value="1" required>
        </label>
        <label class="field">
          <span>Product Image</span>
          <input name="image" type="file" accept="image/*">
        </label>
        <label class="field">
          <span>Location</span>
          <input name="location" type="text" required>
        </label>
        <label class="field">
          <span>Contact Number</span>
          <input name="contactNumber" type="tel" required>
        </label>
        <label class="field full">
          <span>Description</span>
          <textarea name="description" required></textarea>
        </label>
      </div>
      <button class="button" type="submit">Add Product</button>
      <p class="form-message" data-form-message></p>
    </form>
  </main>

  <script src="js/app.js" defer></script>
  <script src="js/sell.js" defer></script>
</body>
</html>
